<!DOCTYPE html>
<html>
<title>country and city</title>
<body style="background-color:white;">
  <center>
    <font color="blue">
      <select onchange="checkcity(this.value)">
        <option>select</option>
        <option value="India">India</option>
        <option value="China">China</option>
        <option value="Germany">Germany</option>
        <option value="Us">Us</option>
        <option value="France">France</option>
      </select>
    </font>

    <br><br>

    <font color="red" size="5">
      <p id="res"></p>
    </font>

    <br>
  </center>

  <script type="text/javascript">
    function checkcity(val) {
      if (val == "India") {
        document.getElementById("res").innerHTML = "Delhi<br> <img src='Delhi.jpg'>" width='200';
      } else if (val == "China") {
        document.getElementById("res").innerHTML = "Hong kong<br> <img src='Hong kong.jpg'>";
      } else if (val == "Germany") {
        document.getElementById("res").innerHTML = "Berlin<br> <img src='Berlin.jpg'>" ;
      } else if (val == "Us") {
        document.getElementById("res").innerHTML = "Washington D.C.<br> <img src='Washington D.C..jpg'>";
      } else if (val == "France") {
        document.getElementById("res").innerHTML = "Paris<br> <img src=' Paris.jpg'>";
      } else {
        document.getElementById("res").innerHTML = "";
      }
    }
  </script>

</body>
</html>
